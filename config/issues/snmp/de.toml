["version: supported"]
description = "Protokollversion unterstützt: `{version}` (überträgt Daten im Klartext)"
recommendations = [
  "Unterstützung für {version} entfernen",
  "auf SNMPv3 mit Authentifizierung und Verschlüsselung umstellen",
  "SNMPv1 und SNMPv2c übertragen Community-Strings und Daten im Klartext und sind daher anfällig für Abhörangriffe",
  "{version} bietet keine Verschlüsselung oder Authentifizierung"
]
references = [
  "RFC 3414: User-based Security Model (USM) for version 3 of SNMP",
  "RFC 1157: Simple Network Management Protocol (SNMP)",
  "RFC 1901: Introduction to Community-based SNMPv2"
]

["version: not supported"]

["version: supported"]
description = "version supported: `{version}` (transmits data in cleartext)"
recommendations = [
  "remove support for {version}",
  "upgrade to SNMPv3 with authentication and encryption",
  "SNMPv1 and SNMPv2c transmit community strings and data in plaintext, making them vulnerable to interception",
  "{version} does not provide encryption or authentication capabilities"
]
references = [
  "RFC 3414: User-based Security Model (USM) for version 3 of SNMP",
  "RFC 1157: Simple Network Management Protocol (SNMP)",
  "RFC 1901: Introduction to Community-based SNMPv2"
]

["version: not supported"]
description = "version not supported: `{version}`"
recommendations = [
  "support {version}",
  "{version} provides User-based Security Model (USM) with authentication and encryption"
]
references = [
  "RFC 3414: User-based Security Model (USM) for version 3 of SNMP"
]

["default community string"]
description = "using default community string: `{community}` ({access})"
recommendations = [
  "change default community strings to complex, unique values",
  "disable SNMP if not required",
  "implement SNMPv3 with authentication and encryption"
]
references = [
  "CWE-1188: Insecure Default Initialization of Resource",
  "OWASP: Default Credentials"
]

["information disclosure"]
description = "exposes {info_type} via {source}: {details}"
recommendations = [
  "review and restrict SNMP information exposure",
  "configure SNMP views to limit accessible OIDs",
  "use SNMPv3 with proper authentication and access controls",
  "consider disabling system description if not needed"
]
references = [
  "CWE-200: Information Exposure",
  "RFC 3415: View-based Access Control Model (VACM) for SNMP"
]

["public server"]
description = "public server ({protocol}, {version})"
recommendations = [
  "restrict SNMP access to management networks only",
  "use firewall rules to block external SNMP access",
  "consider using SNMPv3 with encryption for remote access",
  "implement VPN access for remote SNMP management"
]
references = [
  "NIST SP 800-53 AC-3: Access Enforcement",
  "CIS Critical Security Controls: Network Ports and Protocols"
]

["unusual transport protocol"]
description = "using unusual transport protocol: `{protocol}`"
recommendations = [
  "verify SNMP over TCP configuration is intentional",
  "consider using standard UDP transport for SNMP",
  "ensure firewall rules account for TCP SNMP traffic"
]
references = [
  "IANA: Assigned Internet Protocol Numbers",
  "RFC 3411: SNMP Framework"
]

# SNMPv1 and SNMPv2c are insecure — only SNMPv3 is acceptable
# SNMPv1 (RFC 1157) and SNMPv2c (RFC 1901) transmit community strings in plaintext,
# making them vulnerable to interception and unauthorized access. These versions
# lack authentication and encryption capabilities, allowing attackers to:
# - Intercept and read community strings from network traffic
# - Perform unauthorized SNMP operations using captured credentials
# - Access sensitive system information without proper authorization
# SNMPv3 (RFC 3414) provides User-based Security Model (USM) with authentication
# and encryption, making it the only secure option for SNMP deployments.
versions = ["SNMPv3"]

